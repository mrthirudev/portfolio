name: Build and deploy to GitHub Pages

on:
  push:
    branches: [ main ]

# Grant write permissions so the workflow can push to gh-pages
permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # ensure action has token to push (uses GITHUB_TOKEN automatically)
          persist-credentials: true
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install deps
        run: yarn install --frozen-lockfile
      - name: Build
        env:
          VITE_BASE: "/${{ github.event.repository.name }}/"
        run: yarn build
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_dir: ./dist
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
